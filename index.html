<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual Scanner + Manual Export</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f8f9fa; padding: 15px; margin: 0; }
        #reader { width: 100%; max-width: 500px; margin: auto; background: #000; border-radius: 8px; }
        .stats { display: flex; gap: 10px; justify-content: center; margin: 15px 0; }
        .box { padding: 10px; background: #fff; border: 2px solid #ddd; border-radius: 8px; flex: 1; font-size: 0.9em; }
        .success { border-color: #28a745; background: #d4edda; }
        #msg { color: #666; font-size: 0.85em; margin: 10px 0; min-height: 1.2em; }
        
        .controls { display: flex; flex-direction: column; gap: 10px; align-items: center; }
        button { padding: 15px; width: 100%; max-width: 500px; font-size: 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        
        #submit-btn { background: #28a745; color: white; display: none; }
        #download-btn { background: #007bff; color: white; margin-top: 10px; }
        .btn-clear { background: #6c757d; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        
        #history-status { margin-top: 15px; padding: 10px; background: #e9ecef; border-radius: 5px; font-size: 0.9em; }
    </style>
</head>
<body>

    <h3>QR & Barcode Logger</h3>
    <div id="reader"></div>
    <p id="msg">Initializing camera...</p>

    <div class="stats">
        <div id="qr-box" class="box"><strong>Scan 1</strong><div id="qr-val">---</div></div>
        <div id="bar-box" class="box"><strong>Scan 2</strong><div id="bar-val">---</div></div>
    </div>

    <div class="controls">
        <button id="submit-btn" onclick="handleSubmit()">Save Pair to CSV</button>
        <button id="download-btn" onclick="downloadCSV()">Download CSV (Export Cache)</button>
        <button class="btn-clear" onclick="resetCurrentScan()">Clear Current Scan</button>
        <button class="btn-danger" onclick="clearFullHistory()">Wipe All History</button>
    </div>

    <div id="history-status">
        Items in local cache: <span id="count">0</span>
    </div>

    <script>
        let qrData = null;
        let barData = null;
        const html5QrCode = new Html5Qrcode("reader");
        const msg = document.getElementById('msg');

        // Load existing history from Browser Cache
        let scanHistory = JSON.parse(localStorage.getItem('scan_history')) || [];
        updateHistoryUI();

        const config = { fps: 15, qrbox: { width: 300, height: 150 } };

        // Start Camera
        Html5Qrcode.getCameras().then(cameras => {
            if (cameras.length > 0) {
                const cameraId = cameras[cameras.length - 1].id;
                html5QrCode.start(cameraId, config, onScanSuccess);
                msg.innerText = "Camera Active.";
            }
        });

        function onScanSuccess(decodedText, decodedResult) {
            // Logic: Fill first box, then second box
            if (!qrData) {
                qrData = decodedText;
                document.getElementById('qr-val').innerText = qrData;
                document.getElementById('qr-box').classList.add('success');
                vibrate();
                msg.innerText = "QR code captured. Scan the bar-code on the SIM card.";
            } else if (!barData && decodedText !== qrData) {
                barData = decodedText;
                document.getElementById('bar-val').innerText = barData;
                document.getElementById('bar-box').classList.add('success');
                vibrate();
                msg.innerText = "Data capture complete. Ready to save.";
                document.getElementById('submit-btn').style.display = 'block';
            }
        }

        async function handleSubmit() {
            const timestamp = new Date().toLocaleString();
            const newEntry = { time: timestamp, qr: qrData, bar: barData };

            // 1. Save to Browser Cache (Permanent until wiped)
            scanHistory.push(newEntry);
            localStorage.setItem('scan_history', JSON.stringify(scanHistory));
            updateHistoryUI();

            // 2. Post to Webhook (Optional - replace URL)
            const WEBHOOK_URL = "https://webhook.site/0d325d7d-a0d0-4c39-a6e3-e03db1fccfd3";
            try {
                await fetch(WEBHOOK_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(newEntry) });
            } catch (e) { console.log("Webhook skipped."); }

            alert("Saved to cache!");
            resetCurrentScan();
        }

        function downloadCSV() {
            if (scanHistory.length === 0) {
                alert("Cache is empty. Scan and save some data first!");
                return;
            }

            let csv = "Timestamp,Code_1,Code_2\n";
            scanHistory.forEach(row => {
                // Ensure text is wrapped in quotes to handle commas within data
                csv += `"${row.time}","${row.qr}","${row.bar}"\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            const dateStr = new Date().toISOString().slice(0,10);
            
            a.setAttribute('href', url);
            a.setAttribute('download', `scanner_export_${dateStr}.csv`);
            a.click();
            window.URL.revokeObjectURL(url);
        }

        function updateHistoryUI() {
            document.getElementById('count').innerText = scanHistory.length;
            // Disable download button if cache is empty
            document.getElementById('download-btn').style.opacity = scanHistory.length > 0 ? "1" : "0.5";
        }

        function resetCurrentScan() {
            qrData = null; barData = null;
            document.getElementById('qr-val').innerText = "---";
            document.getElementById('bar-val').innerText = "---";
            document.getElementById('qr-box').classList.remove('success');
            document.getElementById('bar-box').classList.remove('success');
            document.getElementById('submit-btn').style.display = 'none';
            msg.innerText = "Scan the QR code on your AssetHawk first.";
        }

        function clearFullHistory() {
            if (confirm("This will delete ALL saved pairs from the browser cache. Continue?")) {
                scanHistory = [];
                localStorage.removeItem('scan_history');
                updateHistoryUI();
            }
        }

        function vibrate() { if (navigator.vibrate) navigator.vibrate(100); }
    </script>
</body>
</html>
