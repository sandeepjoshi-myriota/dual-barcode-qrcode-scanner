<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Myriota Device to SIM Mapping Tool</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* Prevents the whole page from bouncing or scrolling */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100dvh; 
            overflow: hidden; 
            font-family: sans-serif; 
            background: #f8f9fa; 
        }

        .main-wrapper {
            display: flex;
            flex-direction: column;
            height: 100dvh;
        }

        /* 1. Logo Section: Compact */
        .logo-container {
            flex-shrink: 0;
            background: white;
            padding: 10px;
            text-align: center;
            border-bottom: 2px solid #007bff;
        }
        .logo-container img { height: 40px; width: auto; }

        /* 2. Scanner Section: Reduced Height */
        #scanner-section {
            flex-shrink: 0;
            height: 35vh; /* Reduced to 35% of screen height */
            background: #000;
            overflow: hidden;
            position: relative;
        }
        #reader { height: 100% !important; }
        #reader video { object-fit: cover !important; height: 100% !important; }

        /* 3. Controls Section: Takes the rest of the space */
        #control-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 15px;
            overflow-y: auto; /* Allows internal scroll if content overflows on tiny phones */
            gap: 10px;
        }

        h3 { font-size: 1rem; margin: 5px 0; text-align: center; }
        #msg { color: #007bff; font-size: 0.8em; font-weight: bold; margin-bottom: 10px; text-align: center; }

        .stats { display: flex; gap: 8px; margin-bottom: 10px; }
        .box { padding: 8px; background: #fff; border: 2px solid #ddd; border-radius: 8px; flex: 1; font-size: 0.8em; }
        .success { border-color: #28a745; background: #d4edda; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; font-size: 14px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        
        #submit-btn { background: #28a745; color: white; grid-column: span 2; display: none; }
        #download-btn { background: #007bff; color: white; }
        .btn-clear { background: #6c757d; color: white; }
        .btn-danger { background: #dc3545; color: white; grid-column: span 2; font-size: 12px; margin-top: 5px; }
        
        #history-status { margin-top: auto; padding-top: 10px; font-size: 0.8em; color: #666; text-align: center; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="logo-container">
            <img src="logo.png" alt="Myriota Logo">
        </div>

        <div id="scanner-section">
            <div id="reader"></div>
        </div>

        <div id="control-section">
            <h3>Mapping Tool</h3>
            <p id="msg">Initializing camera...</p>

            <div class="stats">
                <div id="qr-box" class="box"><strong>QR</strong><div id="qr-val">---</div></div>
                <div id="bar-box" class="box"><strong>Bar</strong><div id="bar-val">---</div></div>
            </div>

            <div class="controls">
                <button id="submit-btn" onclick="handleSubmit()">Save Pair to CSV</button>
                <button id="download-btn" onclick="downloadCSV()">Download</button>
                <button class="btn-clear" onclick="resetCurrentScan()">Clear</button>
                <button class="btn-danger" onclick="clearFullHistory()">Wipe All History</button>
            </div>

            <div id="history-status">
                Items in local cache: <span id="count">0</span>
            </div>
        </div>
    </div>

    <script>
        /* Keep your existing script logic exactly as it is */
        let qrData = null;
        let barData = null;
        const html5QrCode = new Html5Qrcode("reader");
        const msg = document.getElementById('msg');
        let scanHistory = JSON.parse(localStorage.getItem('scan_history')) || [];
        updateHistoryUI();

        const config = { fps: 20, qrbox: { width: 200, height: 150 } };

        Html5Qrcode.getCameras().then(cameras => {
            if (cameras.length > 0) {
                const cameraId = cameras[cameras.length - 1].id;
                html5QrCode.start(cameraId, config, onScanSuccess);
                msg.innerText = "Scan the QR code first.";
            }
        });

        function onScanSuccess(decodedText) {
            if (!qrData) {
                qrData = decodedText;
                document.getElementById('qr-val').innerText = qrData;
                document.getElementById('qr-box').classList.add('success');
                vibrate();
                msg.innerText = "QR captured. Scan Bar-code.";
            } else if (!barData && decodedText !== qrData) {
                barData = decodedText;
                document.getElementById('bar-val').innerText = barData;
                document.getElementById('bar-box').classList.add('success');
                vibrate();
                msg.innerText = "Ready to save.";
                document.getElementById('submit-btn').style.display = 'block';
            }
        }

        async function handleSubmit() {
            const timestamp = new Date().toLocaleString();
            const newEntry = { time: timestamp, qr: qrData, bar: barData };
            scanHistory.push(newEntry);
            localStorage.setItem('scan_history', JSON.stringify(scanHistory));
            updateHistoryUI();
            resetCurrentScan();
        }

        function downloadCSV() {
            let csv = "Timestamp,Code_1,Code_2\n";
            scanHistory.forEach(row => { csv += `"${row.time}","${row.qr}","${row.bar}"\n`; });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `scanner_export.csv`;
            a.click();
        }

        function updateHistoryUI() {
            document.getElementById('count').innerText = scanHistory.length;
        }

        function resetCurrentScan() {
            qrData = null; barData = null;
            document.getElementById('qr-val').innerText = "---";
            document.getElementById('bar-val').innerText = "---";
            document.getElementById('qr-box').classList.remove('success');
            document.getElementById('bar-box').classList.remove('success');
            document.getElementById('submit-btn').style.display = 'none';
            msg.innerText = "Scan the QR code first.";
        }

        function clearFullHistory() {
            if (confirm("Wipe all history?")) {
                scanHistory = [];
                localStorage.removeItem('scan_history');
                updateHistoryUI();
            }
        }

        function vibrate() { if (navigator.vibrate) navigator.vibrate(100); }
    </script>
</body>
</html>
