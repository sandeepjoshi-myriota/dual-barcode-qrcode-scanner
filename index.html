<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Dual Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f8f9fa; padding: 20px; }
        #reader { width: 100%; max-width: 500px; margin: auto; background: #000; border-radius: 8px; }
        .stats { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
        .box { padding: 15px; background: #fff; border: 2px solid #ddd; border-radius: 8px; flex: 1; }
        .active { border-color: #007bff; background: #e7f1ff; }
        .success { border-color: #28a745; background: #d4edda; }
        #msg { color: #666; font-size: 0.9em; margin-top: 10px; }
        button { padding: 15px 30px; font-size: 16px; border-radius: 8px; border: none; cursor: pointer; margin: 5px; }
        #submit-btn { background: #28a745; color: white; display: none; width: 100%; max-width: 500px; }
        .btn-clear { background: #6c757d; color: white; }
    </style>
</head>
<body>

    <h3>Step 1: Scan QR | Step 2: Scan Barcode</h3>
    
    <div id="reader"></div>
    <p id="msg">Initializing camera...</p>

    <div class="stats">
        <div id="qr-box" class="box"><strong>QR Code</strong><div id="qr-val">---</div></div>
        <div id="bar-box" class="box"><strong>Barcode</strong><div id="bar-val">---</div></div>
    </div>

    <button id="submit-btn" onclick="submitData()">Submit Pair</button>
    <button class="btn-clear" onclick="resetApp()">Clear All</button>

    <script>
        let qrData = null;
        let barData = null;
        const html5QrCode = new Html5Qrcode("reader");
        const msg = document.getElementById('msg');

        const config = { fps: 15, qrbox: { width: 300, height: 150 } };

        // Start Scanner immediately
        Html5Qrcode.getCameras().then(cameras => {
            if (cameras && cameras.length > 0) {
                // Use the back camera (last in the array usually)
                const cameraId = cameras[cameras.length - 1].id;
                html5QrCode.start(cameraId, config, onScanSuccess);
                msg.innerText = "Camera Active. Point at a code.";
            }
        }).catch(err => {
            msg.innerText = "Camera Error: " + err;
        });

function onScanSuccess(decodedText, decodedResult) {
    // 1. Safety check: Ignore if the text is empty or exactly the same as the first scan
    if (!decodedText || decodedText === qrData) return;

    console.log("Captured:", decodedText);

    // 2. Logic: Fill the first empty slot available
    if (!qrData) {
        // First scan ever
        qrData = decodedText;
        document.getElementById('qr-val').innerText = qrData;
        document.getElementById('qr-box').classList.add('success');
        vibrate();
        msg.innerText = "First code saved. Scan the second one.";
    } 
    else if (!barData) {
        // Second scan
        barData = decodedText;
        document.getElementById('bar-val').innerText = barData;
        document.getElementById('bar-box').classList.add('success');
        vibrate();
        msg.innerText = "Both codes captured. Tap Submit.";
        
        // Show the button
        document.getElementById('submit-btn').style.display = 'block';
    }
}

        async function submitData() {
            const URL = "https://webhook.site/0d325d7d-a0d0-4c39-a6e3-e03db1fccfd3";
            msg.innerText = "Sending...";
            
            try {
                await fetch(URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ qr: qrData, barcode: barData })
                });
                alert("Success!");
                resetApp();
            } catch (e) {
                alert("Error sending. Check URL.");
            }
        }

        function resetApp() {
            qrData = null;
            barData = null;
            document.getElementById('qr-val').innerText = "---";
            document.getElementById('bar-val').innerText = "---";
            document.getElementById('qr-box').className = 'box';
            document.getElementById('bar-box').className = 'box';
            document.getElementById('submit-btn').style.display = 'none';
            msg.innerText = "Scan a code to begin.";
        }

        function vibrate() {
            if (navigator.vibrate) navigator.vibrate(100);
        }
    </script>
</body>
</html>
