<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myriota Device to SIM Mapping Tool</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* 1. Reset and Lock Viewport */
        body, html {
            margin: 0;
            padding: 0;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            font-family: sans-serif;
            background: #f8f9fa;
        }

        /* 2. Flexbox Wrapper */
        .main-wrapper {
            display: flex;
            flex-direction: row; /* Horizontal Columns */
            height: 100dvh;
            width: 100%;
        }

        /* 3. Left Column: The Scanner */
        #scanner-section {
            flex: 2; /* Takes 2/3 of space */
            background: #000;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Ensure the library's reader fills the column */
        #reader { 
            width: 100% !important; 
            height: 100% !important; 
        }
        
        #reader video {
            object-fit: cover !important;
        }

        /* 4. Right Column: Controls & Info */
        #control-section {
            flex: 1; /* Takes 1/3 of space */
            min-width: 280px;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            border-left: 2px solid #007bff;
            padding: 15px;
            overflow-y: auto; /* Scrollable if content is too long */
        }

        /* Logo & Header Styling */
        .logo-container img {
            max-width: 150px;
            height: auto;
            margin-bottom: 10px;
        }

        h3 { font-size: 1.1rem; margin: 10px 0; color: #333; }
        #msg { color: #007bff; font-size: 0.85em; font-weight: bold; margin-bottom: 15px; }

        /* Stats & Buttons */
        .stats { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .box { padding: 10px; background: #fff; border: 2px solid #ddd; border-radius: 8px; font-size: 0.85em; text-align: left; }
        .success { border-color: #28a745; background: #d4edda; }
        
        .controls { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 12px; font-size: 14px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; width: 100%; }
        
        #submit-btn { background: #28a745; color: white; display: none; }
        #download-btn { background: #007bff; color: white; }
        .btn-clear { background: #6c757d; color: white; }
        .btn-danger { background: #dc3545; color: white; margin-top: 10px; font-size: 12px; opacity: 0.8; }
        
        #history-status { margin-top: auto; padding-top: 15px; border-top: 1px solid #eee; font-size: 0.8em; color: #666; }

        /* Mobile Switch: If screen is narrow (Portrait), stack them back up 
        @media (max-width: 600px) {
            .main-wrapper { flex-direction: column; }
            #scanner-section { flex: 1.2; }
            #control-section { flex: 1; border-left: none; border-top: 2px solid #007bff; min-width: 0; }
        }*/
            #orientation-warning {
            display: none;
            position: fixed;
            inset: 0;
            background: #007bff;
            color: white;
            z-index: 9999;
            padding: 40px;
            text-align: center;
        }
        
        @media screen and (orientation: portrait) {
            #orientation-warning { display: flex; align-items: center; }
            .main-wrapper { display: none; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        
        <div id="scanner-section">
            <div id="reader"></div>
        </div>

        <div id="control-section">
            <div class="logo-container">
                <img src="logo.png" alt="Myriota Logo">
            </div>

            <h3>Mapping Tool</h3>
            <p id="msg">Initializing camera...</p>

            <div class="stats">
                <div id="qr-box" class="box"><strong>QR code</strong><div id="qr-val">---</div></div>
                <div id="bar-box" class="box"><strong>Bar-code</strong><div id="bar-val">---</div></div>
            </div>

            <div class="controls">
                <button id="submit-btn" onclick="handleSubmit()">Save Pair to CSV</button>
                <button id="download-btn" onclick="downloadCSV()">Download CSV</button>
                <button class="btn-clear" onclick="resetCurrentScan()">Clear Current</button>
                <button class="btn-danger" onclick="clearFullHistory()">Wipe History</button>
            </div>

            <div id="history-status">
                Items in local cache: <span id="count">0</span>
            </div>
            <div id="orientation-warning">
                <p>Please rotate your device to Landscape mode to use the scanner.</p>
            </div>
        </div>

    </div>

    <script>
        /* Your existing JavaScript remains exactly the same */
        let qrData = null;
        let barData = null;
        const html5QrCode = new Html5Qrcode("reader");
        const msg = document.getElementById('msg');

        let scanHistory = JSON.parse(localStorage.getItem('scan_history')) || [];
        updateHistoryUI();

        const config = { fps: 15, qrbox: { width: 250, height: 250 } };

        Html5Qrcode.getCameras().then(cameras => {
            if (cameras.length > 0) {
                const cameraId = cameras[cameras.length - 1].id;
                html5QrCode.start(cameraId, config, onScanSuccess);
                msg.innerText = "Scan the QR code first.";
            }
        });

        function onScanSuccess(decodedText, decodedResult) {
            if (!qrData) {
                qrData = decodedText;
                document.getElementById('qr-val').innerText = qrData;
                document.getElementById('qr-box').classList.add('success');
                vibrate();
                msg.innerText = "QR captured. Now scan Bar-code.";
            } else if (!barData && decodedText !== qrData) {
                barData = decodedText;
                document.getElementById('bar-val').innerText = barData;
                document.getElementById('bar-box').classList.add('success');
                vibrate();
                msg.innerText = "Ready to save.";
                document.getElementById('submit-btn').style.display = 'block';
            }
        }

        async function handleSubmit() {
            const timestamp = new Date().toLocaleString();
            const newEntry = { time: timestamp, qr: qrData, bar: barData };
            scanHistory.push(newEntry);
            localStorage.setItem('scan_history', JSON.stringify(scanHistory));
            updateHistoryUI();
            
            const WEBHOOK_URL = "https://webhook.site/0d325d7d-a0d0-4c39-a6e3-e03db1fccfd3";
            try {
                await fetch(WEBHOOK_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(newEntry) });
            } catch (e) { console.log("Webhook skipped."); }

            alert("Saved!");
            resetCurrentScan();
        }

        function downloadCSV() {
            if (scanHistory.length === 0) {
                alert("Cache is empty.");
                return;
            }
            let csv = "Timestamp,Code_1,Code_2\n";
            scanHistory.forEach(row => { csv += `"${row.time}","${row.qr}","${row.bar}"\n`; });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', `scanner_export.csv`);
            a.click();
        }

        function updateHistoryUI() {
            document.getElementById('count').innerText = scanHistory.length;
            document.getElementById('download-btn').style.opacity = scanHistory.length > 0 ? "1" : "0.5";
        }

        function resetCurrentScan() {
            qrData = null; barData = null;
            document.getElementById('qr-val').innerText = "---";
            document.getElementById('bar-val').innerText = "---";
            document.getElementById('qr-box').classList.remove('success');
            document.getElementById('bar-box').classList.remove('success');
            document.getElementById('submit-btn').style.display = 'none';
            msg.innerText = "Scan the QR code first.";
        }

        function clearFullHistory() {
            if (confirm("Delete ALL saved pairs?")) {
                scanHistory = [];
                localStorage.removeItem('scan_history');
                updateHistoryUI();
            }
        }

        function vibrate() { if (navigator.vibrate) navigator.vibrate(100); }
    </script>
</body>
</html>
