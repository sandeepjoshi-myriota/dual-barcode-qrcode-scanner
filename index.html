<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Dual Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: system-ui, sans-serif; text-align: center; background: #f4f4f9; padding: 20px; color: #333; }
        #reader { width: 100%; max-width: 500px; margin: 20px auto; border-radius: 12px; overflow: hidden; border: 2px solid #444; background: #000; }
        
        .data-display { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .box { padding: 15px; background: white; border: 2px solid #ddd; border-radius: 10px; flex: 1; max-width: 200px; transition: all 0.3s; }
        .filled { border-color: #28a745; background: #e8f5e9; transform: scale(1.05); }
        
        .controls { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        button { padding: 12px 30px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; width: 220px; }
        
        #submit-btn { background: #007bff; color: white; opacity: 0.4; cursor: not-allowed; }
        #submit-btn.ready { opacity: 1; cursor: pointer; background: #28a745; box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3); }
        
        .btn-reset { background: #6c757d; color: white; }
        .btn-reset:hover { background: #5a6268; }
    </style>
</head>
<body>

    <h2>Dual Scanner Pair</h2>
    
    <div class="data-display">
        <div id="qr-box" class="box">
            <strong>QR Code</strong><br>
            <span id="qr-text">---</span>
        </div>
        <div id="bar-box" class="box">
            <strong>Barcode</strong><br>
            <span id="bar-text">---</span>
        </div>
    </div>

    <div id="reader"></div>

    <div class="controls">
        <button id="submit-btn" onclick="submitPair()" disabled>Submit Pair</button>
        <button class="btn-reset" onclick="resetState()">Clear & Reset</button>
    </div>

    <script>
        let qrData = null;
        let barData = null;

        // --- CONFIGURATION ---
        const WEBHOOK_URL = 'https://webhook.site/0d325d7d-a0d0-4c39-a6e3-e03db1fccfd3'; 
        // ---------------------

        function onScanSuccess(decodedText, decodedResult) {
            const format = decodedResult.result.format.formatName;
            
            // Logic to assign scan to the correct slot
            if (format === "QR_CODE") {
                if (!qrData) {
                    qrData = decodedText;
                    document.getElementById('qr-text').innerText = qrData;
                    document.getElementById('qr-box').classList.add('filled');
                }
            } else {
                if (!barData) {
                    barData = decodedText;
                    document.getElementById('bar-text').innerText = barData;
                    document.getElementById('bar-box').classList.add('filled');
                }
            }

            // Enable the button only when both slots are filled
            checkReadyStatus();
        }

        function checkReadyStatus() {
            const btn = document.getElementById('submit-btn');
            if (qrData && barData) {
                btn.disabled = false;
                btn.classList.add('ready');
                btn.innerText = "Submit to Server";
            } else {
                btn.disabled = true;
                btn.classList.remove('ready');
                btn.innerText = "Waiting for Both...";
            }
        }

        async function submitPair() {
            if (!qrData || !barData) return;

            const btn = document.getElementById('submit-btn');
            btn.innerText = "Sending...";
            btn.disabled = true;

            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        qr_content: qrData,
                        barcode_content: barData,
                        timestamp: new Date().toISOString()
                    })
                });

                alert("Data paired and sent!");
                resetState();
            } catch (error) {
                alert("Submission failed. Check your Webhook URL.");
                console.error(error);
                checkReadyStatus(); // Re-enable button if it failed
            }
        }

        function resetState() {
            qrData = null;
            barData = null;
            document.getElementById('qr-text').innerText = "---";
            document.getElementById('bar-text').innerText = "---";
            document.getElementById('qr-box').classList.remove('filled');
            document.getElementById('bar-box').classList.remove('filled');
            checkReadyStatus();
        }

        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
            fps: 15, 
            qrbox: { width: 300, height: 180 },
            aspectRatio: 1.77
        });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
