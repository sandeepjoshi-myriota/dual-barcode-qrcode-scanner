<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dual Scanner Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        #reader { width: 100%; max-width: 500px; margin: auto; border: 2px solid #333; }
        .status { margin-top: 20px; padding: 10px; border-radius: 5px; background: #f0f0f0; }
        .captured { color: green; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Dual Scanner</h2>
    <div id="reader"></div>
    
    <div class="status">
        <p>QR Code: <span id="qr-val">Waiting...</span></p>
        <p>Barcode: <span id="bar-val">Waiting...</span></p>
        <button onclick="resetScanner()">Reset Pair</button>
    </div>

    <script>
let qrData = null;
let barData = null;
let isProcessing = false; // Prevents "double-tap" scans in one millisecond

function onScanSuccess(decodedText, decodedResult) {
    if (isProcessing) return;
    
    // 1. Check if we already scanned this exact text in this session
    if (decodedText === qrData || decodedText === barData) return;

    isProcessing = true;

    if (!qrData) {
        // First scan goes here
        qrData = decodedText;
        updateUI('qr-val', qrData);
        vibratePhone();
    } else if (!barData) {
        // Second scan goes here
        barData = decodedText;
        updateUI('bar-val', barData);
        vibratePhone();
        sendToServer(qrData, barData);
    }

    // Brief timeout to let the user move the camera to the next code
    setTimeout(() => { isProcessing = false; }, 1500);
}

function updateUI(id, text) {
    const el = document.getElementById(id);
    el.innerText = text;
    el.style.background = "#d4edda"; // Light green highlight
    el.style.fontWeight = "bold";
}

function vibratePhone() {
    if (navigator.vibrate) navigator.vibrate(100);
}

function resetScanner() {
    qrData = null;
    barData = null;
    isProcessing = false;
    document.getElementById('qr-val').innerText = "Waiting...";
    document.getElementById('bar-val').innerText = "Waiting...";
    document.getElementById('qr-val').style.background = "transparent";
    document.getElementById('bar-val').style.background = "transparent";
}

// Optimized Scanner Config
const html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
    fps: 15, 
    qrbox: { width: 250, height: 150 }, // Rectangular box helps with long barcodes
    rememberLastUsedCamera: true,
    aspectRatio: 1.777778 // 16:9 for better mobile view
});
html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
