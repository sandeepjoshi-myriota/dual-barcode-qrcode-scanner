<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dual Scanner Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        #reader { width: 100%; max-width: 500px; margin: auto; border: 2px solid #333; }
        .status { margin-top: 20px; padding: 10px; border-radius: 5px; background: #f0f0f0; }
        .captured { color: green; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Dual Scanner</h2>
    <div id="reader"></div>
    
    <div class="status">
        <p>QR Code: <span id="qr-val">Waiting...</span></p>
        <p>Barcode: <span id="bar-val">Waiting...</span></p>
        <button onclick="resetScanner()">Reset Pair</button>
    </div>

    <script>
        let qrData = null;
        let barData = null;

        function onScanSuccess(decodedText, decodedResult) {
            const format = decodedResult.result.format.formatName;
            
            // Logic to distinguish between QR and Barcode
            if (format === "QR_CODE" && !qrData) {
                qrData = decodedText;
                document.getElementById('qr-val').innerText = qrData;
                document.getElementById('qr-val').classList.add('captured');
            } else if (format !== "QR_CODE" && !barData) {
                barData = decodedText;
                document.getElementById('bar-val').innerText = barData;
                document.getElementById('bar-val').classList.add('captured');
            }

            // If both are found, send to server
            if (qrData && barData) {
                sendToServer(qrData, barData);
            }
        }

        async function sendToServer(qr, bar) {
            console.log("Sending pair:", { qr, bar });
            
            try {
                const response = await fetch('https://webhook.site/0d325d7d-a0d0-4c39-a6e3-e03db1fccfd3', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ qr_code: qr, barcode: bar, timestamp: new Date() })
                });
                
                if (response.ok) {
                    alert("Data paired and sent successfully!");
                    resetScanner();
                }
            } catch (err) {
                alert("Server error. Check console.");
                console.error(err);
            }
        }

        function resetScanner() {
            qrData = null;
            barData = null;
            document.getElementById('qr-val').innerText = "Waiting...";
            document.getElementById('bar-val').innerText = "Waiting...";
            document.getElementById('qr-val').classList.remove('captured');
            document.getElementById('bar-val').classList.remove('captured');
        }

        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
